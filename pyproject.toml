[tool.pytest.ini_options]
minversion = "8.0"
addopts = [
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--strict-config",
    "--strict-markers",
]
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
branch = true
source = ["."]
data_file = "tmp/.coverage"
omit = [
    "tests/*",
    ".venv/*",
    "build/*",
    "dist/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
exclude_also = [
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]

[tool.ruff]
target-version = "py310"
line-length = 100
cache-dir = "tmp/ruff-cache"
extend-exclude = [
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["B", "F", "I", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["constants", "image_viewer", "widgets", "worker"]
